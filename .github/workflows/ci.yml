name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests scripts

      - name: Compile Python
        run: python -m compileall -q src tests scripts

      - name: Check frontend JavaScript syntax
        run: |
          node --check web/shared.js
          node --check web/plan.js
          node --check web/saved.js
          node --check web/account.js

      - name: Verify Vercel public assets are synchronized
        run: |
          python scripts/prepare_vercel_public.py
          git diff --exit-code -- public

      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m pytest -q

  browser-integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m playwright install --with-deps chromium

      - name: Start local API and web
        env:
          PYTHONPATH: src
          GROCERY_DB_PATH: data/ci-grocery-optimizer.db
          GROCERY_LIVE_PRICING_DB: data/ci-live-pricing.db
        run: |
          python -m uvicorn grocery_optimizer.api.app:app --host 127.0.0.1 --port 8000 --app-dir src &
          python -m http.server 8080 --directory web &
          python - <<'PY'
          import time
          import urllib.request

          for url in ("http://127.0.0.1:8000/health", "http://127.0.0.1:8080/index.html"):
              last_error = None
              for _ in range(60):
                  try:
                      with urllib.request.urlopen(url, timeout=2) as response:
                          if response.status == 200:
                              break
                  except Exception as exc:
                      last_error = exc
                      time.sleep(1)
              else:
                  raise RuntimeError(f"Timed out waiting for {url}: {last_error}")
          PY

      - name: Run browser integration
        env:
          PYTHONPATH: src
        run: |
          python scripts/playwright_integration.py
          python scripts/browser_smoke.py
